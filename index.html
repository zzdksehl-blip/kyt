<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대서초 청소당번 뽑기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #e0e7ff 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: move 20s infinite alternate;
        }
        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(255, 255, 255, 0) 70%); }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 3rem 2.5rem;
            max-width: 800px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            font-size: 0.95rem;
            color: var(--text-main);
            resize: none;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 2.5rem;
        }

        .student-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem 0.5rem;
            text-align: center;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: default;
        }

        .student-card .num {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 400;
        }

        .student-card:hover {
            transform: translateY(-5px);
            background: #fff;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
        }

        .student-card.shuffling {
            background: white;
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .student-card.selected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-color: transparent;
            color: #fff;
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 12px 24px -8px rgba(79, 70, 229, 0.5);
        }

        .student-card.selected .num {
            color: rgba(255, 255, 255, 0.7);
        }

        .student-card.bounce {
            animation: cardBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardBounce {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.25) rotate(3deg); }
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            box-shadow: 0 8px 20px -6px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -8px rgba(79, 70, 229, 0.5);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-reset {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-reset:hover {
            background: #fff;
            color: var(--secondary);
        }

        .result-panel {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .result-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 800;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 48px;
            align-items: center;
        }

        .winner-chip {
            background: white;
            color: var(--primary-dark);
            padding: 8px 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid var(--glass-border);
            animation: chipAppear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes chipAppear {
            to { opacity: 1; transform: scale(1); }
        }

        .empty-msg {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1.5rem; }
            h1 { font-size: 1.75rem; }
            .students-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <header>
            <h1>🧹 대서초 청소당번 뽑기</h1>
            <p class="subtitle">모두가 즐거운 교실 만들기!</p>
        </header>

        <div class="input-group">
            <label>학생 명단 <span style="font-weight: 400; opacity: 0.6;">(쉼표 또는 줄바꿈으로 구분)</span></label>
            <textarea id="nameInput" placeholder="이름들을 입력해주세요..."></textarea>
        </div>

        <div class="students-grid" id="studentsGrid"></div>

        <div class="actions">
            <button class="btn btn-primary" id="pickBtn" onclick="pickStudents()">
                <span>🎲</span> 당번 뽑기 시작
            </button>
            <button class="btn btn-reset" onclick="resetAll()">
                <span>↩</span> 초기화
            </button>
        </div>

        <div class="result-panel">
            <div class="result-header">
                <h3>🏆 선정된 청소 요정</h3>
                <span class="badge" id="countBadge">0 / 5</span>
            </div>
            <div class="chips" id="resultChips">
                <span class="empty-msg">아직 선정된 학생이 없습니다.</span>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_NAMES = [
            "김민준", "이서연", "박지호", "최유진", "정하은",
            "강도현", "윤서아", "임재원", "한소희", "오민석",
            "신지우", "백예린", "류성민", "황채원", "조현우",
            "문지아", "전민혁", "양수빈", "홍준서", "남다은",
            "심우진", "노아영", "구태현", "서지민", "안소율"
        ];

        let names = [...DEFAULT_NAMES];
        let pickedIndices = [];
        let isAnimating = false;

        const nameInput = document.getElementById('nameInput');
        const grid = document.getElementById('studentsGrid');
        const chips = document.getElementById('resultChips');
        const badge = document.getElementById('countBadge');

        nameInput.value = DEFAULT_NAMES.join(', ');

        function getNamesFromInput() {
            return nameInput.value.split(/[,\n]+/).map(n => n.trim()).filter(Boolean);
        }

        nameInput.addEventListener('input', () => {
            names = getNamesFromInput();
            renderGrid();
            clearSelection();
        });

        function renderGrid() {
            grid.innerHTML = '';
            const count = Math.max(names.length, 25);
            for (let i = 0; i < count; i++) {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.id = `card-${i}`;
                card.innerHTML = `<span class="num">${i + 1}번</span>${names[i] || '공석'}`;
                grid.appendChild(card);
            }
        }

        function clearSelection() {
            pickedIndices = [];
            chips.innerHTML = '<span class="empty-msg">아직 선정된 학생이 없습니다.</span>';
            badge.textContent = '0 / 5';
            document.querySelectorAll('.student-card').forEach(c => {
                c.classList.remove('selected', 'bounce', 'shuffling');
            });
        }

        async function pickStudents() {
            if (isAnimating || names.length === 0) return;
            
            clearSelection();
            isAnimating = true;
            const pickBtn = document.getElementById('pickBtn');
            pickBtn.disabled = true;
            pickBtn.style.opacity = '0.5';

            // Shuffling effect
            for (let i = 0; i < 20; i++) {
                const randomIdx = Math.floor(Math.random() * names.length);
                const card = document.getElementById(`card-${randomIdx}`);
                if (card) {
                    card.classList.add('shuffling');
                    await new Promise(r => setTimeout(r, 60));
                    card.classList.remove('shuffling');
                }
            }

            const indices = [];
            while (indices.length < Math.min(5, names.length)) {
                const r = Math.floor(Math.random() * names.length);
                if (!indices.includes(r)) indices.push(r);
            }

            for (let i = 0; i < indices.length; i++) {
                const idx = indices[i];
                await new Promise(r => setTimeout(r, 400));
                
                const card = document.getElementById(`card-${idx}`);
                if (card) {
                    card.classList.add('selected', 'bounce');
                }

                if (i === 0) chips.innerHTML = '';
                
                const chip = document.createElement('div');
                chip.className = 'winner-chip';
                chip.textContent = names[idx];
                chips.appendChild(chip);
                
                badge.textContent = `${i + 1} / 5`;
            }

            isAnimating = false;
            pickBtn.disabled = false;
            pickBtn.style.opacity = '1';
        }

        function resetAll() {
            if (isAnimating) return;
            nameInput.value = DEFAULT_NAMES.join(', ');
            names = [...DEFAULT_NAMES];
            renderGrid();
            clearSelection();
        }

        renderGrid();
    </script>
</body>
</html>
